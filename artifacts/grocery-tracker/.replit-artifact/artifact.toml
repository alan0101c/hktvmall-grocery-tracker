kind = "web"
previewPath = "/"
title = "Grocery Price Tracker"
version = "1.0.0"
id = "artifacts/grocery-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24087
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/grocery-tracker run dev"

[services.env]
PORT = "24087"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/grocery-tracker", "run", "build"]
publicDir = "artifacts/grocery-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
